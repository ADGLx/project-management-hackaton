services:
  db:
    image: postgres:17
    container_name: pmh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmh_password}
      POSTGRES_DB: ${POSTGRES_DB:-pmh_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile.deploy
    container_name: pmh-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # env_file:
    #   - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_ORIGIN: ${DEPLOY_FRONTEND_ORIGIN:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_MAX_AGE_MS: ${COOKIE_MAX_AGE_MS:-86400000}
      POSTGRES_HOST: ${POSTGRES_HOST:-pmh-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-pmh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmh_password}
      POSTGRES_DB: ${POSTGRES_DB:-pmh_db}
    # expose:
    #   - "3000"

  frontend:
    build:
      context: .
      dockerfile: front-end/Dockerfile.deploy
      args:
        VITE_API_URL: /api
    container_name: pmh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # ports:
    #   - "${DEPLOY_PORT:-80}:80"

volumes:
  postgres_data:
